<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokémon-Steckbrief</title>
</head>
<body>
    <section>
        <div class="container">
            <h1>Pokémon-Steckbrief <br><span>Generator</span></h1>
            <form class="pokemon-generator">
                <!-- <label for="text-feld"></label> -->
                <input type="text" id="text-feld"   placeholder="Gib einen Namen:z.B: Pikachu oder Glurak" aria-label="Schreibe dein Pokemon">
                <button type="submit" id="generate-btn">Generate</button>
            </form>
        </div>
        <div class="ergebnis-feld">
            <div class="img-bereich"></div>
            <div class="beschreibung"></div>
        </div>

    </section>

    <script src="main.js"></script>
</body>
</html>

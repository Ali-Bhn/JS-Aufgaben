<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Zufällige Passwort generieren</title>
</head>
<body>
    <div class="container">
        <h1>Generate a <br><span>Random Password</span></h1>
        <div class="display">
            <input type="text" id="password" placeholder="Password">
            <img onclick="copyPassword()" src="./images /copy.png" alt="Icon von Copy">
            
        </div>
        <button onclick="createPassword()"><img src="./images /generate.png" alt="Generate Icon">Generate password</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
